services:
  unsloth:
    profiles:
      - training
    build:
      context: .
      dockerfile: fine-tuning/Dockerfile
    container_name: category-fine-tuning
    working_dir: /workspace
    volumes:
      - .:/workspace
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HOME=/root/.cache/huggingface
    gpus: all
    stdin_open: true
    tty: true

  ollama:
    image: ollama/ollama:0.20.3
    container_name: category-classifier-ollama
    volumes:
      - .:/workspace
      - ollama-models:/root/.ollama
    ports:
      - "11499:11434"
    stdin_open: true
    tty: true

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: category-api
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    ports:
      - "8090:8000"
    stdin_open: true
    tty: true

volumes:
  huggingface-cache:
  ollama-models:
